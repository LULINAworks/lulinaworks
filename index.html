<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LULINAworks – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5efe6;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('Lulina_00309_.png');
      background-size: cover;
      background-position: center top;
      filter: brightness(0.92);
      z-index: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(245, 239, 230, 0.72) 0%,
        rgba(245, 239, 230, 0.18) 50%,
        rgba(245, 239, 230, 0.05) 100%
      );
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: left;
      padding: 3rem 5vw;
      align-self: center;
      margin-right: auto;
      margin-left: 6vw;
      animation: fadeUp 1.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.5vw, 1.1rem);
      letter-spacing: 0.35em;
      color: #8a7560;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 1.6s 0.2s ease both;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 8vw, 7rem);
      color: #3a3028;
      line-height: 1.05;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 1.6s 0.4s ease both;
    }

    .title span {
      display: block;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: #b8a48e;
      margin: 2rem 0;
      opacity: 0;
      animation: fadeUp 1.6s 0.6s ease both;
    }

    .sub {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.18em;
      color: #8a7560;
      opacity: 0;
      animation: fadeUp 1.6s 0.8s ease both;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <p class="brand">LULINAworks</p>
    <h1 class="title">
      <span>Coming</span>
      <span>Soon</span>
    </h1>
    <div class="divider"></div>
    <p class="sub">準備中です</p>
  </div>
</body>
</html>
